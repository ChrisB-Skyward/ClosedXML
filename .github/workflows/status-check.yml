name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x' # or your project's version

      - name: Restore dependencies
        run: dotnet restore ClosedXML.sln

      - name: Build
        run: dotnet build ClosedXML.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test ClosedXML.sln --no-build --verbosity normal
